<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>SMPL-X Sequences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #06100f;
      --surface: #0c1f1d;
      --border: rgba(38, 212, 200, .15);
      --accent: #26d4c8;
      --accent2: #7fffd4;
      --text: #c8e8e4;
      --muted: #4a7a74;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      display: block;
    }

    /* ── back link ── */
    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      color: var(--muted);
      font-size: .8rem;
      text-decoration: none;
      letter-spacing: .05em;
      transition: color .2s;
    }

    .back:hover {
      color: var(--accent);
    }

    /* ── top info bar ── */
    .info-bar {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .info-bar .label {
      font-family: 'Syne', sans-serif;
      font-size: .65rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .info-bar .value {
      font-size: .8rem;
      color: var(--accent);
    }

    /* ── bottom controls ── */
    .controls {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .seq-picker {
      display: flex;
      gap: 8px;
    }

    .seq-btn {
      padding: 7px 22px;
      background: rgba(6, 16, 15, .7);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      letter-spacing: .05em;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }

    .seq-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .seq-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(38, 212, 200, .08);
    }

    /* ── timeline scrubber ── */
    .timeline {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 340px;
    }

    .play-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .2s, background .2s;
    }

    .play-btn:hover {
      background: rgba(38, 212, 200, .1);
      border-color: var(--accent);
    }

    .play-btn svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .scrubber {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform .1s;
    }

    .scrubber::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .time-label {
      font-size: .72rem;
      color: var(--muted);
      width: 44px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── loader ── */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 30;
      background: var(--bg);
      transition: opacity .4s;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .loader-sub {
      font-size: .75rem;
      color: var(--muted);
    }

    .progress-bar {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .1s;
      border-radius: 2px;
    }

    #app {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

  <a class="back" href="../index.html">← retour</a>

  <div class="info-bar">
    <span class="label">séquence</span>
    <span class="value" id="seq-label">01</span>
  </div>

  <div id="loader">
    <div class="loader-title">Chargement</div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog"></div>
    </div>
    <div class="loader-sub" id="loader-sub">séquence 1…</div>
  </div>

  <div id="app"></div>

  <div class="controls">
    <div class="seq-picker">
      <button class="seq-btn active" data-seq="1">Séq. 1</button>
      <button class="seq-btn" data-seq="2">Séq. 2</button>
      <button class="seq-btn" data-seq="3">Séq. 3</button>
    </div>

    <div class="timeline">
      <button class="play-btn" id="play-btn" title="Lecture / Pause">
        <svg id="play-icon" viewBox="0 0 10 12">
          <polygon points="0,0 10,6 0,12" />
        </svg>
      </button>
      <input class="scrubber" type="range" id="scrubber" min="0" max="1" step="0.001" value="0" />
      <span class="time-label" id="time-label">0.0s</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ── Renderer ── */
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.getElementById('app').appendChild(renderer.domElement);

    /* ── Scene ── */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x06100f);
    scene.fog = new THREE.FogExp2(0x06100f, 0.08);

    /* ── Camera ── */
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 1.2, 4.5);

    /* ── Lights ── */
    scene.add(new THREE.AmbientLight(0x9ecfca, 0.5));

    const key = new THREE.DirectionalLight(0xffffff, 2.5);
    key.position.set(2, 4, 3);
    key.castShadow = true;
    key.shadow.mapSize.set(1024, 1024);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x26d4c8, 0.4);
    fill.position.set(-3, 2, -2);
    scene.add(fill);

    /* ── Ground ── */
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 12),
      new THREE.MeshStandardMaterial({ color: 0x0a1e1c, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    /* ── Grid ── */
    const grid = new THREE.GridHelper(12, 24, 0x1a3a36, 0x0f2420);
    grid.position.y = 0.001;
    scene.add(grid);

    /* ── Controls ── */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 1;
    controls.maxDistance = 20;
    controls.target.set(0, 0.9, 0);
    controls.update();

    /* ── State ── */
    const clock = new THREE.Clock();
    let mixer = null;
    let action = null;
    let current = null;
    let duration = 0;
    let playing = true;

    const loaderEl = document.getElementById('loader');
    const progEl = document.getElementById('prog');
    const subEl = document.getElementById('loader-sub');
    const scrubber = document.getElementById('scrubber');
    const timeLabel = document.getElementById('time-label');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const seqLabel = document.getElementById('seq-label');

    const PAUSE_SVG = `<rect x="1" y="0" width="3" height="12"/><rect x="6" y="0" width="3" height="12"/>`;
    const PLAY_SVG = `<polygon points="0,0 10,6 0,12"/>`;

    /* ── Load ── */
    const loader = new GLTFLoader();

    function loadSequence(n) {
      loaderEl.classList.remove('hidden');
      progEl.style.width = '0%';
      subEl.textContent = `séquence ${n}…`;
      seqLabel.textContent = String(n).padStart(2, '0');

      if (current) { scene.remove(current); current = null; }
      if (mixer) { mixer.stopAllAction(); mixer = null; action = null; }

      loader.load(
        `./seq_glb/${n}.glb`,
        (gltf) => {
          current = gltf.scene;

          /* shadows */
          current.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
              if (obj.material) {
                obj.material.side = THREE.FrontSide;
                /* subtle teal tint */
                if (obj.material.color) obj.material.color.multiplyScalar(0.95);
              }
            }
          });

          scene.add(current);

          /* fit camera */
          const box = new THREE.Box3().setFromObject(current);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());

          current.position.x -= center.x;
          current.position.z -= center.z;
          /* keep Y: model already grounded at 0 */

          const maxDim = Math.max(size.x, size.y, size.z);
          const fov = camera.fov * (Math.PI / 180);
          const dist = (maxDim / (2 * Math.tan(fov / 2))) * 1.6;

          camera.position.set(0, size.y * 0.55, dist);
          controls.target.set(0, size.y * 0.45, 0);
          controls.update();

          /* animation */
          if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(current);
            action = mixer.clipAction(gltf.animations[0]);
            duration = gltf.animations[0].duration;
            action.play();
            playing = true;
            playIcon.innerHTML = PAUSE_SVG;
            scrubber.max = duration;
          } else {
            duration = 0;
          }

          progEl.style.width = '100%';
          setTimeout(() => loaderEl.classList.add('hidden'), 300);
        },
        (xhr) => {
          if (xhr.total) {
            const pct = (xhr.loaded / xhr.total * 100).toFixed(0);
            progEl.style.width = pct + '%';
          }
        },
        (err) => {
          subEl.textContent = `Erreur : ${n}.glb introuvable.`;
          console.error(err);
        }
      );
    }

    /* ── Play / Pause ── */
    playBtn.addEventListener('click', () => {
      if (!action) return;
      playing = !playing;
      playing ? action.play() : action.paused = true;
      if (!playing) action.paused = true;
      else { action.paused = false; }
      playIcon.innerHTML = playing ? PAUSE_SVG : PLAY_SVG;
    });

    /* ── Scrubber (drag) ── */
    let scrubbing = false;
    scrubber.addEventListener('mousedown', () => { scrubbing = true; });
    scrubber.addEventListener('touchstart', () => { scrubbing = true; }, { passive: true });

    scrubber.addEventListener('input', () => {
      if (!mixer || !action) return;
      const t = parseFloat(scrubber.value);
      mixer.setTime(t);
      timeLabel.textContent = t.toFixed(1) + 's';
    });

    window.addEventListener('mouseup', () => { scrubbing = false; });
    window.addEventListener('touchend', () => { scrubbing = false; });

    /* ── Sequence buttons ── */
    document.querySelectorAll('.seq-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.seq-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadSequence(btn.dataset.seq);
      });
    });

    loadSequence('1');

    /* ── Resize ── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ── Loop ── */
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (mixer && playing && !scrubbing) {
        mixer.update(delta);

        if (duration > 0) {
          const t = mixer.time % duration;
          scrubber.value = t;
          timeLabel.textContent = t.toFixed(1) + 's';
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
