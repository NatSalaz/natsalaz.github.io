<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <!-- TO CHANGE: We will chanfge this title -->
  <title>SMPL-X Sequences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: var(--text-muted);
      font-size: .9rem;
      text-decoration: none;
      transition: color .15s;
    }

    .back:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .seq-picker {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .seq-btn {
      padding: 8px 20px;
      background: rgba(4, 18, 16, .6);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-soft);
      font-family: inherit;
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .seq-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .seq-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(38, 212, 200, .1);
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: .95rem;
      pointer-events: none;
      z-index: 5;
    }

    .fallback {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>

<body>

  <a class="back" href="../index.html">← Back</a>

  <div class="seq-picker">
    <button class="seq-btn active" data-seq="1">Séquence 1</button>
    <button class="seq-btn" data-seq="2">Séquence 2</button>
    <button class="seq-btn" data-seq="3">Séquence 3</button>
  </div>

  <div id="loader">Chargement...</div>
  <div id="app"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const loaderEl = document.getElementById('loader');

    /* Scene */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x081a1a);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100); camera.position.set(0, 1, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    /* Lights */
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(2, 4, 3);
    scene.add(dirLight);

    /* Controls */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);
    controls.update();

    /* GLTF loader */
    const loader = new GLTFLoader();
    let current = null;

    function loadSequence(n) {
      loaderEl.style.display = 'flex';

      if (current) {
        scene.remove(current);
        current = null;
      }

      loader.load(
        `./seq_glb/${n}.glb`,
        (gltf) => {
          current = gltf.scene;
          scene.add(current);

          // compute bounding box
          const box = new THREE.Box3().setFromObject(current);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());

          // center model
          current.position.sub(center);

          // adjust camera distance based on size
          const maxDim = Math.max(size.x, size.y, size.z);

          const fov = camera.fov * (Math.PI / 180);
          let distance = maxDim / (2 * Math.tan(fov / 2));

          distance *= 1.4; // margin

          // set camera position
          camera.position.set(0, size.y * 0.6, distance);

          // look at center
          controls.target.set(0, size.y * 0.5, 0);
          controls.update();

          loaderEl.style.display = 'none';
        },
        null,
        (err) => {
          loaderEl.textContent = `Erreur : fichier ${n}.glb introuvable.`;
          console.error(err);
        }
      );
    }

    /* Sequence buttons */
    document.querySelectorAll('.seq-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.seq-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadSequence(btn.dataset.seq);
      });
    });

    loadSequence('1');

    /* Resize */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* Loop */
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>

</body>

</html>
