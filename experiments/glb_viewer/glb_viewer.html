<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>SMPL-X Sequences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="glb_viewer.css" />
</head>

<body>

  <div class="ui-overlay">
    <a class="back-fixed" href="../../index.html">← Back</a>
  </div>

  <div class="info-bar">
    <span class="label">séquence</span>
    <span class="value" id="seq-label">01</span>
  </div>

  <div id="loader">
    <a class="back" href="../../index.html">← Back</a>
    <div class="loader-title">Chargement</div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog"></div>
    </div>
    <div class="loader-sub" id="loader-sub">séquence 1…</div>
  </div>

  <div id="app"></div>

  <div class="controls">
    <div class="seq-picker">
      <button class="seq-btn active" data-seq="1">Séq. 1</button>
      <button class="seq-btn" data-seq="2">Séq. 2</button>
      <button class="seq-btn" data-seq="3">Séq. 3</button>
    </div>
    <div class="timeline">
      <button class="play-btn" id="play-btn" title="Lecture / Pause">
        <svg id="play-icon" viewBox="0 0 10 12">
          <polygon points="0,0 10,6 0,12" />
        </svg>
      </button>
      <input class="scrubber" type="range" id="scrubber" min="0" max="1" step="0.001" value="0" />
      <span class="time-label" id="time-label">0.0s</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="viewer.js"></script>

</body>

</html>
