<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>3D Sphere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../style.css" />

</head>

<body>

  <a class="back" href="../index.html">← Back</a>

  <div id="app"></div>

  <!-- WebGL path -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    const app = document.getElementById("app");

    function showFallback(reason) {
      app.innerHTML = `
        <div class="fallback">
          <div>
            <h1>3D not available</h1>
            <p>${reason}</p>
          </div>
        </div>
      `;
    }

    function webglAvailable() {
      try {
        const canvas = document.createElement("canvas");
        return !!(
          window.WebGLRenderingContext &&
          (canvas.getContext("webgl") ||
            canvas.getContext("experimental-webgl"))
        );
      } catch {
        return false;
      }
    }

    if (!webglAvailable()) {
      showFallback("WebGL is not supported in this environment.");
      throw new Error();
    }

    try {
      /*  THREE SETUP  */

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );

      camera.position.x = 0;
      camera.position.y = 0;
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      app.appendChild(renderer.domElement);

      /*  CUBE  */

      const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
      const material = new THREE.MeshStandardMaterial({
        color: 0x38bdf8,
        roughness: 0.4,
        metalness: 0.4
      });
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);
      cube.rotation.x = 0.2;
      cube.rotation.y = 0.3;

      //  EDGES (white lines) 

      const edgesGeometry = new THREE.EdgesGeometry(geometry);
      const edgesMaterial = new THREE.LineBasicMaterial({
        color: 0xffffff,
        linewidth: 1
      });

      const edges = new THREE.LineSegments(edgesGeometry, edgesMaterial);

      // attacher les arêtes au cube
      cube.add(edges);
      /*  LIGHT  */

      scene.add(new THREE.AmbientLight(0xffffff, 0.5));

      const light = new THREE.DirectionalLight(0xffffff, 4);
      light.position.set(2, 3, 8);
      scene.add(light);

      /*  MOUSE CONTROLS  */

      let isLeftDown = false;
      let isMiddleDown = false;
      let lastX = 0;
      let lastY = 0;

      const moveSpeed = 0.01;
      const rotateSpeed = 0.005;

      renderer.domElement.addEventListener("mousedown", (e) => {
        if (e.button === 0) isLeftDown = true;      // left
        if (e.button === 1) isMiddleDown = true;    // middle
        lastX = e.clientX;
        lastY = e.clientY;
      });

      renderer.domElement.addEventListener("mouseup", () => {
        isLeftDown = false;
        isMiddleDown = false;
      });

      renderer.domElement.addEventListener("mouseleave", () => {
        isLeftDown = false;
        isMiddleDown = false;
      });

      renderer.domElement.addEventListener("mousemove", (e) => {
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;

        if (isLeftDown) {
          // rotation on itself
          cube.rotation.y += dx * rotateSpeed;
          cube.rotation.x += dy * rotateSpeed;
        }

        if (isMiddleDown) {
          // move in camera plane (screen space)
          cube.position.x += dx * moveSpeed;
          cube.position.y -= dy * moveSpeed;
        }

        lastX = e.clientX;
        lastY = e.clientY;
      });

      // prevent middle click scroll
      renderer.domElement.addEventListener("wheel", e => e.preventDefault(), {
        passive: false
      });


      /*  TOUCH CONTROLS (mobile)  */

      let touchMode = null;
      let lastTouchX = 0;
      let lastTouchY = 0;

      renderer.domElement.addEventListener("touchstart", (e) => {
        e.preventDefault();

        if (e.touches.length === 1) {
          touchMode = "rotate";
        }

        if (e.touches.length === 2) {
          touchMode = "move";
        }

        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;

      }, { passive: false });

      renderer.domElement.addEventListener("touchmove", (e) => {
        e.preventDefault();

        const touch = e.touches[0];

        const dx = touch.clientX - lastTouchX;
        const dy = touch.clientY - lastTouchY;

        if (touchMode === "rotate") {
          cube.rotation.y += dx * rotateSpeed;
          cube.rotation.x += dy * rotateSpeed;
        }

        if (touchMode === "move") {
          cube.position.x += dx * moveSpeed;
          cube.position.y -= dy * moveSpeed;
        }

        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;

      }, { passive: false });

      renderer.domElement.addEventListener("touchend", () => {
        touchMode = null;
      });
      /*  RESIZE  */

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      /*  LOOP  */

      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      animate();

    } catch (err) {
      console.error(err);
      showFallback("WebGL context creation failed.");
    }
  </script>

</body>

</html>
